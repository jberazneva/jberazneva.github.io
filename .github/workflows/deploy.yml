name: Build and deploy Jekyll site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync content-source into site/_data and site/_includes
        run: |
          mkdir -p site/_data site/_includes site/assets/files
          cp content-source/*.yml site/_data/
          cp content-source/bio.md site/_includes/bio.md
          # Keep the latest CV PDF on the deployed site
          latest_cv=$(ls -t reference/Berazneva_CV-*.pdf 2>/dev/null | head -n 1 || true)
          if [ -n "$latest_cv" ]; then
            cp "$latest_cv" site/assets/files/cv.pdf
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: site

      - name: Build site
        run: |
          cd site
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
